<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent}
#c{position:relative;width:100%;height:100%}
#c img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.2s ease-in-out;pointer-events:none}
#c img.active{opacity:1}
</style>
</head>
<body>
<div id=c></div>
<script>
let i=0,imgs=[],t=null
function startSlideshow(u){
  let c=document.getElementById('c')
  u.forEach((url,j)=>{
    let img=document.createElement('img')
    img.src=url
    if(j===0)img.classList.add('active')
    c.appendChild(img)
    imgs.push(img)
  })
  t=setInterval(()=>{
    imgs.forEach(x=>x.classList.remove('active'))
    i=(i+1)%imgs.length
    imgs[i].classList.add('active')
  },5000)
}
let drag=false,sx,sy
window.addEventListener('mousedown',e=>{drag=true;sx=e.screenX;sy=e.screenY})
window.addEventListener('mousemove',e=>{
  if(!drag)return
  let dx=e.screenX-sx,dy=e.screenY-sy
  if(window.pywebview)pywebview.api.move_by(dx,dy)
  sx=e.screenX;sy=e.screenY
})
window.addEventListener('mouseup',()=>{drag=false})
</script>
</body>
</html>
